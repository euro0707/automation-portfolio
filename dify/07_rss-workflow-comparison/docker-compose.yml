version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-rss-automation
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_WEBHOOK_URL=http://localhost:5679/
      - N8N_GENERIC_TIMEZONE=Asia/Tokyo
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./.n8n:/home/node/.n8n
    networks:
      - automation-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dify-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dify
      - dify-api
    networks:
      - automation-network
    restart: unless-stopped

  dify:
    image: langgenius/dify-web:1.14.2
    container_name: dify-rss-automation
    expose:
      - "3000"
    environment:
      - EDITION=SELF_HOSTED
      - CONSOLE_API_URL=http://localhost:8080
      - APP_API_URL=http://localhost:8080
      - TZ=Asia/Tokyo
    depends_on:
      - dify-api
    networks:
      - automation-network
    restart: unless-stopped

  dify-api:
    image: langgenius/dify-api:1.14.2
    container_name: dify-api
    expose:
      - "5001"
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - SECRET_KEY=${DIFY_SECRET_KEY:-changeme-secret-key-change-in-production}
      - DEPLOY_ENV=docker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=dify
      - DB_PASSWORD=${DB_PASSWORD:-difypassword}
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage
      - CONSOLE_URL=http://localhost:8080
      - CONSOLE_API_URL=http://localhost:8080
      - APP_API_URL=http://localhost:8080
      - SERVICE_API_URL=http://localhost:8080
      - FILES_URL=http://localhost:8080
      - CONSOLE_CORS_ALLOW_ORIGINS=http://localhost:8080
      - WEB_API_CORS_ALLOW_ORIGINS=http://localhost:8080
      - CONSOLE_WEB_URL=http://localhost:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TZ=Asia/Tokyo
      - INNER_API_KEY_FOR_PLUGIN=${INNER_API_KEY_FOR_PLUGIN:-dify-plugin-inner-api-key-2026}
      - PLUGIN_DAEMON_URL=http://plugin_daemon:5002
      - PLUGIN_DAEMON_KEY=${INNER_API_KEY_FOR_PLUGIN:-dify-plugin-inner-api-key-2026}
      - PLUGIN_REMOTE_INSTALL_HOST=localhost
      - PLUGIN_REMOTE_INSTALL_PORT=5004
      - PLUGIN_MAX_PACKAGE_SIZE=52428800
      - PLUGIN_DAEMON_TIMEOUT=600.0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./dify_data/storage:/app/storage
    networks:
      - automation-network
    restart: unless-stopped

  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.6.1-local
    container_name: dify-plugin-daemon
    expose:
      - "5002"
    ports:
      - "5004:5003"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=dify
      - DB_PASSWORD=${DB_PASSWORD:-difypassword}
      - DB_DATABASE=dify
      - SERVER_PORT=5002
      - SERVER_KEY=${INNER_API_KEY_FOR_PLUGIN:-dify-plugin-inner-api-key-2026}
      - DIFY_INNER_API_URL=http://dify-api:5001
      - DIFY_INNER_API_KEY=${INNER_API_KEY_FOR_PLUGIN:-dify-plugin-inner-api-key-2026}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage
      - PLUGIN_WORKING_PATH=/app/storage/plugins
      - PLUGIN_REMOTE_INSTALLING_HOST=0.0.0.0
      - PLUGIN_REMOTE_INSTALLING_PORT=5003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - FORCE_VERIFYING_SIGNATURE=false
      - PYTHON_ENV_INIT_TIMEOUT=120
      - MAX_PLUGIN_PACKAGE_SIZE=52428800
      - TZ=Asia/Tokyo
    depends_on:
      - postgres
      - redis
      - dify-api
    volumes:
      - ./dify_data/storage:/app/storage
    networks:
      - automation-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dify-redis
    ports:
      - "6379:6379"
    volumes:
      - ./dify_data/redis:/data
    networks:
      - automation-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: dify-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dify
      - POSTGRES_PASSWORD=${DB_PASSWORD:-difypassword}
      - POSTGRES_DB=dify
    volumes:
      - ./dify_data/postgres:/var/lib/postgresql/data
    networks:
      - automation-network
    restart: unless-stopped

networks:
  automation-network:
    driver: bridge
